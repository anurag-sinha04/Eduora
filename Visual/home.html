<!DOCTYPE html>
<html>
<head>
  <title>Voice Control System</title>
</head>
<body style="background:black;color:white;font-family:sans-serif;text-align:center;padding:40px;">

<h1>🎤 Voice Control System</h1>
<p id="status">Say a command...</p>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = new SpeechRecognition();
recognition.continuous = true;
recognition.lang = "en-IN";

recognition.onresult = (event) => {
  const text = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
  document.getElementById("status").innerText = text;

  handleCommand(text);
};

recognition.start();

function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function openNewTab(url){
  window.open(url, "_blank", "noopener,noreferrer");
}

function handleCommand(text){

  // 🌍 GOOGLE
  if(text.includes("open google")){
    speak("Opening Google");
    openNewTab("https://google.com");
  }

  // ▶️ YOUTUBE
  else if(text.includes("open youtube")){
    speak("Opening YouTube");
    openNewTab("https://youtube.com");
  }
 else if(text.includes("open text to speech") || text.includes("speech")){
    speak("Write text which is then converted to speech");
    openNewTab("./text2speech.html");
  }
  else if(text.includes("home") || text.includes("starting")){
    speak("Going to home page");
    window.location.href = "../index.html";
  }
  // 🎵 PLAY ANYTHING
  else if(text.startsWith("play")){
    let query = text.replace("play", "").trim();
    speak("Playing " + query);
    openNewTab(`https://www.youtube.com/results?search_query=${query}`);
  }

  // 🎬 MOVIE
  else if(text.includes("movie")){
    let movie = text.replace("movie", "").trim();
    speak("Searching movie " + movie);
    openNewTab(`https://www.youtube.com/results?search_query=${movie}+trailer`);
  }

  // 🎥 VIDEO CALL
  else if(text.includes("open video") || text.includes("video call")){
    speak("Opening video conference");
    openNewTab("https://visora-call.onrender.com/");
  }

  // 🌍 TRANSLATION
  else if (
    text.includes("vernacular") || 
    text.includes("translation") || 
    text.includes("translate") || 
    text.includes("language")
  ) {
    speak("Opening translation");
    openNewTab("https://speech-translator-y66c.onrender.com/");
  }

  // 🔍 SEARCH
  else if(text.startsWith("search")){
    let query = text.replace("search", "").trim();
    speak("Searching " + query);
    openNewTab(`https://www.google.com/search?q=${query}`);
  }

  // 📸 CAMERA
  else if (text.includes("open camera")) {
    speak("Opening camera");

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        let video = document.createElement("video");
        video.srcObject = stream;
        video.autoplay = true;
        video.style.position = "fixed";
        video.style.top = "20px";
        video.style.right = "20px";
        video.style.width = "300px";
        document.body.appendChild(video);
      })
      .catch(() => {
        speak("Camera access denied");
      });
  }

  // 🔽 SCROLL
  else if(text.includes("scroll down")){
    window.scrollBy(0, 500);
  }

  else if(text.includes("scroll up")){
    window.scrollBy(0, -500);
  }

  // 🔙 HOME (instead of back)
  else if (
    text.includes("go back") || 
    text.includes("back") || 
    text.includes("previous")
  ) {
    speak("Going to previous page");

    setTimeout(() => {
      openNewTab("./home.html");
    }, 800);
  }

  // ⌨️ TYPE
  else if(text.startsWith("type")){
    let words = text.replace("type", "").trim();
    document.body.innerHTML += "<p>" + words + "</p>";
  }

  // 📄 SUMMARIZER
  else if(text.includes("summarizer")){
    speak("Opening summarizer");
  }

  else{
    speak("Command not recognized");
  }
}
</script>
</body>
</html>
